---
# Defaults for create_boot_source_pvc role

# Namespace where boot source PVCs will be created
boot_source_pvc_namespace: "cnv-images"

# Whether to create the namespace if it doesn't exist
boot_source_create_namespace: true

# Namespace display name and description
boot_source_namespace_display_name: "CNV Boot Images"
boot_source_namespace_description: "Namespace for storing CNV/KubeVirt boot source PVCs"

# Default storage class (empty = cluster default)
boot_source_storage_class: ""

# Default access modes
boot_source_default_access_modes:
  - ReadWriteMany

# Default volume mode
boot_source_default_volume_mode: Block

# Default storage size
boot_source_default_storage: "60Gi"

# Default DataSource namespace
boot_source_default_datasource_namespace: "openshift-virtualization-os-images"

# List of boot source PVCs to create
boot_source_pvcs: []
# Example:
# boot_source_pvcs:
#   - name: rhel9                    # Required: PVC name
#     datasource_name: rhel9          # Required: DataSource to clone from
#     datasource_namespace: "{{ boot_source_default_datasource_namespace }}"  # Optional: defaults to boot_source_default_datasource_namespace
#     storage: "30Gi"                 # Optional: defaults to boot_source_default_storage
#     storage_class: ""               # Optional: defaults to boot_source_storage_class
#     access_modes:                   # Optional: defaults to boot_source_default_access_modes
#       - ReadWriteMany
#     volume_mode: Block              # Optional: defaults to boot_source_default_volume_mode

# OpenShift connection details (from cluster context)
boot_source_ocp_api_url: "{{ openshift_api_url | default(lookup('env', 'OPENSHIFT_API_URL')) | default(omit) }}"
boot_source_ocp_api_token: "{{ openshift_cluster_admin_token | default(lookup('env', 'OPENSHIFT_TOKEN')) | default(omit) }}"
boot_source_ocp_validate_certs: false

# Wait for PVC to be bound (useful for testing, not needed for WaitForFirstConsumer)
boot_source_wait_for_bound: false
boot_source_wait_timeout: 300
boot_source_wait_delay: 10
