---
# Tasks for create_boot_source_pvc role

- name: Validate boot_source_pvcs is defined and not empty
  ansible.builtin.fail:
    msg: "boot_source_pvcs must be defined and contain at least one PVC configuration"
  when:
    - boot_source_pvcs | length == 0

- name: Create cnv-images namespace if needed
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ boot_source_pvc_namespace }}"
    state: present
    host: "{{ boot_source_ocp_api_url }}"
    api_key: "{{ boot_source_ocp_api_token }}"
    validate_certs: "{{ boot_source_ocp_validate_certs }}"
  when: boot_source_create_namespace | bool

- name: Add annotations to namespace if created
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ boot_source_pvc_namespace }}"
    host: "{{ boot_source_ocp_api_url }}"
    api_key: "{{ boot_source_ocp_api_token }}"
    validate_certs: "{{ boot_source_ocp_validate_certs }}"
    definition:
      metadata:
        annotations:
          openshift.io/display-name: "{{ boot_source_namespace_display_name }}"
          openshift.io/description: "{{ boot_source_namespace_description }}"
  when:
    - boot_source_create_namespace | bool
    - boot_source_namespace_display_name | length > 0 or boot_source_namespace_description | length > 0

- name: Create boot source PVCs from DataSources
  kubernetes.core.k8s:
    state: present
    host: "{{ boot_source_ocp_api_url }}"
    api_key: "{{ boot_source_ocp_api_token }}"
    validate_certs: "{{ boot_source_ocp_validate_certs }}"
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{ item.name }}"
        namespace: "{{ boot_source_pvc_namespace }}"
        labels:
          app: boot-source
          datasource: "{{ item.datasource_name }}"
      spec:
        accessModes: "{{ item.access_modes | default(boot_source_default_access_modes) }}"
        volumeMode: "{{ item.volume_mode | default(boot_source_default_volume_mode) }}"
        storageClassName: "{{ item.storage_class | default(boot_source_storage_class) | default(omit) }}"
        resources:
          requests:
            storage: "{{ item.storage | default(boot_source_default_storage) }}"
        dataSourceRef:
          kind: DataSource
          name: "{{ item.datasource_name }}"
          namespace: "{{ item.datasource_namespace | default(boot_source_default_datasource_namespace) }}"
  loop: "{{ boot_source_pvcs }}"
  loop_control:
    label: "{{ item.name }}"
  register: r_boot_source_pvcs

- name: Display created PVCs
  ansible.builtin.debug:
    msg:
      - "Created boot source PVCs in namespace: {{ boot_source_pvc_namespace }}"
      - "PVCs: {{ boot_source_pvcs | map(attribute='name') | list | join(', ') }}"
  when: r_boot_source_pvcs is changed

- name: Wait for PVCs to be bound (optional)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: PersistentVolumeClaim
    name: "{{ item.name }}"
    namespace: "{{ boot_source_pvc_namespace }}"
    host: "{{ boot_source_ocp_api_url }}"
    api_key: "{{ boot_source_ocp_api_token }}"
    validate_certs: "{{ boot_source_ocp_validate_certs }}"
  loop: "{{ boot_source_pvcs }}"
  loop_control:
    label: "{{ item.name }}"
  register: r_pvc_status
  until: r_pvc_status.resources[0].status.phase | default('') == "Bound"
  retries: "{{ (boot_source_wait_timeout | int / boot_source_wait_delay | int) | int }}"
  delay: "{{ boot_source_wait_delay }}"
  when: boot_source_wait_for_bound | bool
  failed_when: false  # Don't fail if WaitForFirstConsumer
