---
# Tasks for create_namespace role
- name: Fail if namespace name not provided
  ansible.builtin.fail:
    msg: "create_namespace_name is required"
  when: create_namespace_name | length == 0

- name: Create namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ create_namespace_name }}"
    state: present
    host: "{{ create_namespace_ocp_api_url }}"
    api_key: "{{ create_namespace_ocp_api_token }}"
    validate_certs: "{{ create_namespace_ocp_validate_certs }}"

- name: Add annotations to namespace if provided
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ create_namespace_name }}"
    host: "{{ create_namespace_ocp_api_url }}"
    api_key: "{{ create_namespace_ocp_api_token }}"
    validate_certs: "{{ create_namespace_ocp_validate_certs }}"
    definition:
      metadata:
        annotations:
          openshift.io/display-name: "{{ create_namespace_display_name }}"
          openshift.io/description: "{{ create_namespace_description }}"
  when:
    - create_namespace_display_name | length > 0 or create_namespace_description | length > 0

- name: Grant admin access to sandbox service account
  kubernetes.core.k8s:
    state: present
    host: "{{ create_namespace_ocp_api_url }}"
    api_key: "{{ create_namespace_ocp_api_token }}"
    validate_certs: "{{ create_namespace_ocp_validate_certs }}"
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "sandbox-admin"
        namespace: "{{ create_namespace_name }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: admin
      subjects:
        - kind: ServiceAccount
          name: "{{ create_namespace_grant_admin_sa_name }}"
          namespace: "{{ create_namespace_grant_admin_to_sa }}"
  when:
    - create_namespace_grant_admin_to_sa | length > 0

- name: Display RoleBinding info for debugging
  ansible.builtin.debug:
    msg:
      - "Created RoleBinding 'sandbox-admin' in namespace {{ create_namespace_name }}"
      - "Granted admin ClusterRole to ServiceAccount {{ create_namespace_grant_admin_sa_name }} in namespace {{ create_namespace_grant_admin_to_sa }}"
  when:
    - create_namespace_grant_admin_to_sa | length > 0
