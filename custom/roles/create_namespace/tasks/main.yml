---
# Tasks for create_namespace role
- name: Fail if namespace name not provided
  ansible.builtin.fail:
    msg: "create_namespace_name is required"
  when: create_namespace_name | length == 0

- name: Create namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ create_namespace_name }}"
    state: present
    host: "{{ create_namespace_ocp_api_url }}"
    api_key: "{{ create_namespace_ocp_api_token }}"
    validate_certs: "{{ create_namespace_ocp_validate_certs }}"

- name: Add annotations to namespace if provided
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ create_namespace_name }}"
    host: "{{ create_namespace_ocp_api_url }}"
    api_key: "{{ create_namespace_ocp_api_token }}"
    validate_certs: "{{ create_namespace_ocp_validate_certs }}"
    definition:
      metadata:
        annotations:
          openshift.io/display-name: "{{ create_namespace_display_name }}"
          openshift.io/description: "{{ create_namespace_description }}"
  when:
    - create_namespace_display_name | length > 0 or create_namespace_description | length > 0
